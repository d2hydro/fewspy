name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  tests:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.70.1
          cache: true

      - name: Run tests
        run: pixi run tests

  build:
    name: Build distributions
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Verify version matches release tag
        shell: bash
        run: |
          tag_version="${{ github.event.release.tag_name }}"
          tag_version="${tag_version#v}"
          wheel="$(find dist -maxdepth 1 -name 'fewspy-*.whl' -print -quit)"
          python -m pip install "$wheel"
          package_version="$(python -c "from importlib.metadata import version; print(version('fewspy'))")"
          test "$package_version" = "$tag_version"

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fewspy
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
